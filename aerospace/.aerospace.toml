after-login-command   = []
after-startup-command = []

start-at-login = false

enable-normalization-flatten-containers                         = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 42

default-root-container-layout      = "tiles"
default-root-container-orientation = "auto"

key-mapping.preset = "qwerty"

on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
on-focus-changed           = ["move-mouse window-lazy-center"]

[gaps]
inner.horizontal = 1
inner.vertical   = 1
outer.left       = 1
outer.bottom     = 1
outer.top        = 1
outer.right      = 1

[mode.main.binding]
cmd-shift-slash = "layout tiles horizontal vertical"
cmd-shift-comma = "layout accordion horizontal vertical"

cmd-h = "focus left"
cmd-j = "focus down"
cmd-k = "focus up"
cmd-l = "focus right"

cmd-shift-h = "move left"
cmd-shift-j = "move down"
cmd-shift-k = "move up"
cmd-shift-l = "move right"

alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

alt-shift-1 = "move-node-to-workspace 1"
alt-shift-2 = "move-node-to-workspace 2"
alt-shift-3 = "move-node-to-workspace 3"
alt-shift-4 = "move-node-to-workspace 4"
alt-shift-5 = "move-node-to-workspace 5"
alt-shift-6 = "move-node-to-workspace 6"
alt-shift-7 = "move-node-to-workspace 7"
alt-shift-8 = "move-node-to-workspace 8"
alt-shift-9 = "move-node-to-workspace 9"

alt-shift-f            = ["fullscreen"]
alt-esc                = ["focus-back-and-forth"]
alt-tab                = ["workspace-back-and-forth"]
alt-leftSquareBracket  = ["workspace prev --wrap-around"]
alt-rightSquareBracket = ["workspace next --wrap-around"]
alt-shift-enter        = ["exec-and-forget aerospace list-workspaces --monitor focused --empty no | aerospace workspace next --wrap-around"]

cmd-leftSquareBracket  = ["focus-monitor prev --wrap-around"]
cmd-rightSquareBracket = ["focus-monitor next --wrap-around"]

cmd-shift-rightSquareBracket = ["move-workspace-to-monitor --wrap-around next"]

cmd-shift-semicolon = "mode service"
alt-shift-r         = "mode resize"
alt-shift-p         = "mode pass"

[mode.pass.binding]
esc   = "mode main"

[mode.resize.binding]
h = "resize width -50"
j = "resize height +50"
k = "resize height -50"
l = "resize width +50"
b = ["balance-sizes", "mode main"]

minus = "resize smart -50"
equal = "resize smart +50"
esc   = "mode main"

cmd-shift-h = ["join-with left", "mode main"]
cmd-shift-j = ["join-with down", "mode main"]
cmd-shift-k = ["join-with up", "mode main"]
cmd-shift-l = ["join-with right", "mode main"]

[mode.service.binding]
esc = ["reload-config", "mode main"]
r = ["flatten-workspace-tree", "mode main"]
f = ["layout floating tiling", "mode main"]

[[on-window-detected]]
if.app-id = "org.mozilla.firefox"
run       = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = "org.alacritty"
run       = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "com.mitchellh.ghostty"
run       = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "dev.zed.Zed"
run       = "move-node-to-workspace 3"

[[on-window-detected]]
if.window-title-regex-substring = "Burp Suite Professional"
run                             = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "org.chromium.Chromium"
run       = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "com.parallels.desktop.console"
run       = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = "org.kicad.kicad"
run       = "move-node-to-workspace 5"

[[on-window-detected]]
if.app-id = "com.apple.Notes"
run       = "move-node-to-workspace 6"

[[on-window-detected]]
if.app-id = "org.blenderfoundation.blender"
run       = "move-node-to-workspace 6"

[[on-window-detected]]
if.app-id = "com.hnc.Discord"
run       = "move-node-to-workspace 7"

[[on-window-detected]]
if.app-id = "org.whispersystems.signal-desktop"
run       = "move-node-to-workspace 8"

[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run       = "move-node-to-workspace 8"

[[on-window-detected]]
if.app-id = "com.brave.Browser"
run       = "move-node-to-workspace 9"

[[on-window-detected]]
if.app-id = "com.1password.1password"
run       = "layout floating"

[[on-window-detected]]
if.app-id = "com.apple.finder"
run       = "layout floating"

[workspace-to-monitor-force-assignment]
1 = ["main"]
2 = ["main"]
3 = ["main"]
4 = ["main"]
5 = ["main"]
6 = ["main"]
7 = ["secondary", "main"]
8 = ["secondary", "main"]
9 = ["secondary", "main"]
